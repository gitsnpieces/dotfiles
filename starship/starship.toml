format = """\
[вХ≠вХі](fg:arrow)\
$username\
$directory\
$time\
(\
    $git_branch\
    $git_status\
)\
(\
    $python\
    $conda\
    $nodejs\
)\
$cmd_duration
[вХ∞вФА](fg:arrow)$character\
"""
# Add the modules you need

# Disables the blank line at the start of the prompt
add_newline = true


# Palettes:
#   old: the previous version.
#   normal: dark gray / yellow / white palette.
#   light: pastel light colors.
# To change the colors: change to the corresponding palette.
palette = "normal"

[palettes.old]
arrow = "#353535"
os = "#3778BF"
os_admin = "#6A040F"
directory = "#3F37C9"
node = "green"
time = "#177E89"
git = "#B02B10"
git_status = "#8B1D2C"
python = "#3776AB"
conda = "#3EB049"
java = "#861215"
rust = "#C33C00"
clang = "#00599D"
duration = "yellow"
text_color = "#EDF2F4"
text_light = "#EDF2F4"

[palettes.normal]
arrow = "#353535"
os = "#2C3032"
os_admin = "#6A040F"
directory = "#363C3E"
time = "#474D5C"
node = "#F1DEA9"
git = "#D0DBDA"
git_status = "#DFEBED"
python = "#F5CB5C"
conda = "#3EB049"
java = "#861215"
rust = "#C33C00"
clang = "#00599D"
duration = "#F4FBFF"
text_color = "#EDF2F4"
text_light = "#26272A"

[palettes.light]
arrow = "#353535"
os = "#F7768E"
os_admin = "#ACBEF1"
directory = "#FF9578"
time = "#FFDC72"
git = "#F5F5F5"
git_status = "#72FFD5"
clang = "#67E3FF"
java = "#FF52A3"
python = "#B4F9F8"
node = "#81FF85"
conda = "#BAF5C0"
duration = "#91FFE7"
text_color = "#26272A"
text_light = "#26272A"

[username]
style_user = 'os'
style_root = 'os_admin'
format = '[оВґ]($style)[пЕЇ  w11](bg:$style fg:text_color)[оВі]($style)'
disabled = false
show_always = true

[character]
success_symbol = "[у∞НЯ](fg:arrow)"
error_symbol = "[у∞НЯ](fg:red)"

[directory]
format = " [оВґ](fg:directory)[пБЉ  $path ]($style)[$read_only]($read_only_style)[оВі](fg:directory)"
truncation_length = 2
style = "fg:text_color bg:directory"
read_only_style = "fg:text_color bg:directory"
before_repo_root_style = "fg:text_color bg:directory"
truncation_symbol = "вА¶/"
truncate_to_repo = true
read_only =" о©µ "

[time]
disabled = false
format = " [оВґ](fg:time)[пАЧ $time]($style)[оВі](fg:time)"
time_format = "%H:%M"
style = "fg:text_color bg:time"

[cmd_duration]
format = " [оВґ](fg:duration)[пЙФ $duration]($style)[оВі](fg:duration)"
style = "fg:text_light bg:duration"
min_time = 500

[git_branch]
format = " [оВґ](fg:git)[$symbol$branch](fg:text_light bg:git)[оВі](fg:git)"
symbol = "пРШ "

[git_status]
format = '([ оВґ](fg:git_status)[ $all_status$ahead_behind ]($style)[оВі](fg:git_status))'
style = "fg:text_light bg:git_status"

[docker_context]
disabled=true
symbol = "пМИ "

[package]
disabled=true

[java]
format = "[ оВґ](fg:java)[$symbol$version](bg:java fg:text_color)[оВі](fg:java)"
version_format = "${raw}"
symbol = "оЙЦ "
disabled = true

[nodejs]
format = "[ оВґ](fg:node)[$symbol$version]($style)[оВі](fg:node)"
style = "bg:node fg:text_light"
symbol = "оЬШ "
version_format = "${raw}"
disabled=false

[rust]
format = "[ оВґ](fg:rust)[$symbol$version](bg:rust fg:text_color)[оВі](fg:rust)"
symbol = "оЪЛ "
version_format = "${raw}"
disabled=true

[python]
disabled=false
format = '[ оВґ](fg:python)[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\))]($style)[оВі](fg:python)'
symbol = "оШЖ "
version_format = "${raw}"
style = "fg:text_light bg:python"

[conda]
format = "[ оВґ](fg:conda)[$symbol$environment]($style)[оВі](fg:conda)"
style = "bg:conda fg:text_color"
ignore_base = false
disabled=false
symbol = "пДМ "

[c]
format = "[ оВґ](fg:clang)[$symbol($version(-$name) )](bg:clang fg:text_color)[оВі](fg:clang)"
symbol = "оШЮ "
version_format = "${raw}"
disabled=true

