"$schema" = 'https://starship.rs/config-schema.json'

format = """
[в–‘в–’в–“](#a3aed2)\
[   $os  ](bg:#a3aed2 fg:#090c0c)\
[оӮҙ](bg:#5884db fg:#a3aed2)\
$directory\
[оӮҙ](fg:#5884db bg:#394260)\
$hostname\
[оӮҙ](fg:#394260 bg:#1d2230)\
$time\
[оӮҙ ](fg:#1d2230)\
\n$character"""

[directory]
style = "fg:#ffffff bg:#5884db"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

[hostname]
ssh_only = false
style = "bg:#394260"
format = '[[  $hostname ](fg:#ffffff bg:#394260)]($style)'
disabled = false

[time]
disabled = false
time_format = "%I:%M%P"
style = "bg:#1d2230"
format = '[[ рҹ•ҷ $time ](fg:#dae6fc bg:#1d2230)]($style)'

[character]
success_symbol = "[   в•°в”Җ-в•°в”Җ----оҡғ ](bold blue) "
#success_symbol = "[ вң…  --- оҡғ ](bold green) "
#error_symbol = "[ рҹ’Җ  --- оҡғ ](bold red) "  
error_symbol = "[   в•°в”Җ-в•°в”Җ----оҡғ ](bold blue) "

[os]
disabled = false
style = "bg:red fg:crust"

