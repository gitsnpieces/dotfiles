[git_branch]
symbol = "пРШ"
style = "bg:#394260"
format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

[time]
disabled = false
time_format = "%I:%M %P"
style = "bg:#1d2230"
format = '[[ рЯХЩ $time ](fg:#a0a9cb bg:#1d2230)]($style)'

[character]
success_symbol = "[ оЪГ](bold blue) "
#success_symbol = "[вЬФ ](bold green) "
