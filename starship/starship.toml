# Disable the blank line at the start of the prompt
# add_newline = false

[character]
# success_symbol = '[  ůĪě©](bold text)'
success_symbol = '[‚ěú](bold green)'
error_symbol = '[ÔÄć](bold red)[ ůĪě©](bold text)'
vimcmd_symbol = '[Óėę](bold flamingo)[ ůĪě©](bold text)'

[fill]
symbol = '‚ĒÄ'
style = 'fg:green'

# You can also replace your username with a neat symbol like ÔĄ†  or disable this
# and use the os module below
[username]
style_user = "bold bg:text fg:base"
style_root = "bold bg:text fg:base"
format = '[$user]($style)'
show_always = false
disabled = false

# An alternative to the username module which displays a symbol that
# represents the current operating system
[os]
style = "bg:text fg:base"
disabled = false

[hostname]
style = "bg:text fg:base"
format = '[@$hostname]($style)'

[directory]
style = "bg:overlay2 fg:base"
format = "[ $path ]($style)"
# truncation_length = 3
# truncation_symbol = "‚Ä¶/"
fish_style_pwd_dir_length = 1

[c]
symbol = "Óėě "
style = "bg:lavender fg:base"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = "ÔĆą "
style = "bg:blue fg:base"
format = '[ $symbol $context ]($style)'

[elixir]
symbol = "ÓČĶ "
style = "bg:lavender fg:base"
format = '[ $symbol ($version) ]($style)'

[elm]
symbol = "Óė¨ "
style = "bg:lavender fg:base"
format = '[ $symbol ($version) ]($style)'

[git_branch]
symbol = "Ôźė"
style = "bg:surface2 fg:text"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:surface0 fg:base"
format = '[$all_status$ahead_behind ]($style)'
disabled = true

[git_metrics]
disabled = false
added_style = "bg:surface0 fg:green"
deleted_style = "bg:surface0 fg:red"
format = """
([ ]($added_style)([+$added ]($added_style))([-$deleted]($deleted_style))[ ]($deleted_style))\
"""

[git_state]
style = "bg:surface0 fg:text"

[golang]
